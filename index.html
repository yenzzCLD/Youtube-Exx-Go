<style>
    /* --- TOAST NOTIFY --- */
    #exx-layer {
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000001;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
        align-items: center;
    }

    .exx-toast {
        background: rgba(15, 15, 15, 0.95);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        color: #ffffff;
        padding: 12px 25px;
        border-radius: 50px;
        font-family: sans-serif;
        font-size: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .exx-toast.tampil { opacity: 1; transform: translateY(0); }

    /* --- MODAL ENGINE --- */
    #exx-modal-layer {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 10000000;
        display: none;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    #exx-modal-layer.tampil { display: flex; opacity: 1; }

    .exx-modal-box {
        background: #0f0f0f;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 28px;
        border-radius: 30px;
        color: white;
        font-family: sans-serif;
        width: 340px;
        max-width: 90%;
        transform: scale(0.8);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    }

    #exx-modal-layer.tampil .exx-modal-box { transform: scale(1); }

    .exx-modal-text {
        margin-bottom: 22px;
        font-size: 18px;
        font-weight: 600;
        text-align: left;
        line-height: 1.4;
    }

    /* --- INPUT PROMPT --- */
    .exx-input {
        width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.15); background: #1a1a1a;
        color: white; box-sizing: border-box; outline: none; font-size: 15px;
    }
    .exx-input:focus { border-color: #4285f4; }

    /* --- CHOOSE LIST --- */
    .exx-list-container {
        display: flex; flex-direction: column; width: 100%;
        margin-bottom: 10px; text-align: left;
    }

    .exx-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
        transition: 0.2s;
    }

    .exx-item:last-child { border-bottom: none; }

    .exx-item-text { font-size: 16px; color: #fff; }

    .exx-radio-circle {
        width: 20px; height: 20px; border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }

    .exx-item.active .exx-item-text { color: #4285f4; }
    .exx-item.active .exx-radio-circle { border-color: #4285f4; }
    .exx-item.active .exx-radio-circle::after {
        content: ''; width: 10px; height: 10px; background: #4285f4; border-radius: 50%;
    }

    /* --- BUTTONS --- */
    .exx-btn-group { display: flex; gap: 15px; justify-content: flex-end; margin-top: 15px; }
    .exx-btn {
        padding: 10px 20px; border: none; border-radius: 50px; cursor: pointer;
        font-weight: 700; font-size: 14px; transition: 0.2s; background: transparent;
    }
    .exx-btn-cancel { color: #888; }
    .exx-btn-ok { color: #4285f4; }
    .exx-btn:hover { background: rgba(255,255,255,0.05); }
</style>

<div id="exx-layer"></div>
<div id="exx-modal-layer">
    <div class="exx-modal-box">
        <div class="exx-modal-text" id="exx-modal-msg"></div>
        <input type="text" class="exx-input" id="exx-modal-input" style="display:none;">
        <div id="exx-modal-list" style="display:none;"></div>
        <div class="exx-btn-group" id="exx-btn-group">
            <button class="exx-btn exx-btn-cancel" id="exx-btn-cancel">BATAL</button>
            <button class="exx-btn exx-btn-ok" id="exx-btn-ok">OKE</button>
        </div>
    </div>
</div>

<script>
    const exxEl = {
        layer: document.getElementById('exx-modal-layer'),
        msg: document.getElementById('exx-modal-msg'),
        input: document.getElementById('exx-modal-input'),
        list: document.getElementById('exx-modal-list'),
        btnOk: document.getElementById('exx-btn-ok'),
        btnCancel: document.getElementById('exx-btn-cancel')
    };

    function notify(pesan) {
        const wadah = document.getElementById('exx-layer');
        const item = document.createElement('div');
        item.className = 'exx-toast';
        item.innerText = pesan;
        wadah.appendChild(item);
        setTimeout(() => item.classList.add('tampil'), 50);
        setTimeout(() => {
            item.classList.remove('tampil');
            setTimeout(() => item.remove(), 500);
        }, 3000);
    }
    window.alert = (pesan) => notify(pesan);

    function coreModal(pesan, tipe, def = '') {
        return new Promise((resolve) => {
            exxEl.msg.innerText = pesan;
            exxEl.list.style.display = 'none';
            exxEl.btnOk.style.display = 'block';
            exxEl.input.style.display = tipe === 'prompt' ? 'block' : 'none';
            if(tipe === 'prompt') exxEl.input.value = def;

            exxEl.layer.style.display = 'flex';
            setTimeout(() => exxEl.layer.classList.add('tampil'), 10);
            if(tipe === 'prompt') exxEl.input.focus();

            const close = (res) => {
                exxEl.layer.classList.remove('tampil');
                setTimeout(() => { exxEl.layer.style.display = 'none'; resolve(res); }, 300);
            };

            exxEl.btnOk.onclick = () => close(tipe === 'prompt' ? exxEl.input.value : true);
            exxEl.btnCancel.onclick = () => close(tipe === 'prompt' ? null : false);
        });
    }

    window.confirm = (msg) => coreModal(msg, 'confirm');
    window.prompt = (msg, def) => coreModal(msg, 'prompt', def);

    window.exxChoose = function(judul, options, current = '') {
        return new Promise((resolve) => {
            exxEl.msg.innerText = judul;
            exxEl.input.style.display = 'none';
            exxEl.btnOk.style.display = 'none'; 

            exxEl.list.innerHTML = '';
            exxEl.list.className = 'exx-list-container';
            exxEl.list.style.display = 'block';

            options.forEach(opt => {
                const item = document.createElement('div');
                item.className = `exx-item ${opt === current ? 'active' : ''}`;
                item.innerHTML = `<span class="exx-item-text">${opt}</span><div class="exx-radio-circle"></div>`;
                
                item.onclick = () => {
                    document.querySelectorAll('.exx-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    setTimeout(() => {
                        exxEl.layer.classList.remove('tampil');
                        setTimeout(() => {
                            exxEl.layer.style.display = 'none';
                            exxEl.btnOk.style.display = 'block';
                            resolve(opt);
                        }, 300);
                    }, 200);
                };
                exxEl.list.appendChild(item);
            });

            exxEl.layer.style.display = 'flex';
            setTimeout(() => exxEl.layer.classList.add('tampil'), 10);

            exxEl.btnCancel.onclick = () => {
                exxEl.layer.classList.remove('tampil');
                setTimeout(() => {
                    exxEl.layer.style.display = 'none';
                    exxEl.btnOk.style.display = 'block';
                    resolve(null);
                }, 300);
            };
        });
    };
</script>


<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  html, body {
    touch-action: pan-x pan-y;
    -webkit-user-select: none;
    user-select: none;
    overflow-y: auto;
    overflow-x: hidden;
  }
</style>

<script>
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && ['+', '-', '=', '0'].includes(e.key)) {
      e.preventDefault();
    }
  });

  document.addEventListener('wheel', (e) => {
    if (e.ctrlKey) e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  let lastTouch = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
  }, false);
</script>
