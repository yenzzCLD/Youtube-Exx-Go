    .exx-toast {
        background: rgba(15, 15, 15, 0.9); /* Jet Black */
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #ffffff;
        padding: 12px 25px;
        border-radius: 50px; /* Round Corner Google Style */
        font-family: sans-serif;
        font-size: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .exx-toast.tampil {
        opacity: 1;
        transform: translateY(0);
    }
</style>

<div id="exx-layer"></div>

<script>
    function notify(pesan) {
        const wadah = document.getElementById('exx-layer');
        const item = document.createElement('div');
        item.className = 'exx-toast';
        item.innerText = pesan;
        wadah.appendChild(item);
        setTimeout(() => item.classList.add('tampil'), 50);
        setTimeout(() => {
            item.classList.remove('tampil');
            setTimeout(() => item.remove(), 500);
        }, 3000);
    }
    window.alert = function(pesan) {
        notify(pesan);
    };

    console.log("Sistem Alert sudah diganti ke EXX Notify!");
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  html, body {
    touch-action: pan-x pan-y;
    -webkit-user-select: none;
    user-select: none;
    overflow-y: auto;
    overflow-x: hidden;
  }
</style>

<script>
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && ['+', '-', '=', '0'].includes(e.key)) {
      e.preventDefault();
    }
  });

  document.addEventListener('wheel', (e) => {
    if (e.ctrlKey) e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  let lastTouch = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
  }, false);
</script>
